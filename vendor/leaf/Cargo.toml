[package]
name = "leaf"
version = "1.26.0"
edition = "2021"
description = "A friendly terminal Markdown previewer"
license = "MIT"

[lib]
name = "leaf"
path = "src/lib.rs"

[[bin]]
name = "leaf"
path = "src/main.rs"
required-features = ["bin"]

[features]
default = ["bin"]
# Everything beyond the embeddable markdown/theme lib: the full TUI app,
# CLI, clipboard, editor integration, and self-updater.
bin = ["dep:anyhow", "dep:crossterm", "dep:reqwest", "dep:semver", "dep:sha2"]

[dependencies]
ratatui       = "0.30"
crossterm     = { version = "0.29", optional = true }
pulldown-cmark = "0.12"
syntect       = { version = "5.2", default-features = false, features = ["default-syntaxes", "default-themes", "regex-onig"] }
anyhow        = { version = "1.0", optional = true }
unicode-width = "0.2"
reqwest       = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"], optional = true }
serde         = { version = "1.0", features = ["derive"] }
semver        = { version = "1.0", optional = true }
sha2          = { version = "0.10", optional = true }
toml          = "0.8"
unicodeit     = "0.2"
mmdflux       = "2.5"

[target.'cfg(target_os = "macos")'.dependencies]
crossterm     = { version = "0.29", features = ["use-dev-tty"], optional = true }
